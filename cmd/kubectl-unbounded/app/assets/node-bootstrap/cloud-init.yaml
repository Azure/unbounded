#cloud-config
# -----------------------------------------------------------------
# Unbounded-kube node bootstrap cloud-init
#
# Generated by: kubectl unbounded node-bootstrap --variant cloud-init
# Machine:      {{ .MachineName }}
# -----------------------------------------------------------------

write_files:
  - path: /etc/unbounded-agent/config.json
    permissions: "0600"
    content: |
{{ .AgentConfigJSON | indent 6 }}

  - path: /usr/local/bin/unbounded-agent-install.sh
    permissions: "0755"
    content: |
{{ .InstallScript | indent 6 }}

  - path: /usr/local/bin/unbounded-agent-uninstall.sh
    permissions: "0755"
    content: |
{{ .UninstallScript | indent 6 }}

runcmd:
  - export UNBOUNDED_AGENT_CONFIG_FILE=/etc/unbounded-agent/config.json
  - bash /usr/local/bin/unbounded-agent-install.sh
