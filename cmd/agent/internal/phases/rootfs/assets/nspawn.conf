# The .nspawn file is read by machinectl/systemd-nspawn automatically. Because
# the default systemd-nspawn@.service template uses `--settings=override`,
# settings here (in the trusted /etc/systemd/nspawn/ directory) take precedence
# over CLI flags — PrivateUsers=no overrides -U, VirtualEthernet=no overrides
# --network-veth. There is no need to override ExecStart.
#
# Security relaxations required for nested containers (kubelet -> containerd -> runc):
#   Capability=all       - runc needs CAP_SYS_ADMIN, CAP_NET_ADMIN, CAP_MKNOD, etc.
#   PrivateUsers=no      - runc needs real root (UID 0) for namespace creation.
#   SystemCallFilter=@keyring bpf - containerd uses the kernel keyring subsystem;
#                                   runc uses eBPF for cgroups v2 device control.
#   VirtualEthernet=no   - share host network; kubelet uses the host's routable IP.

[Exec]
Capability=all
PrivateUsers=no
SystemCallFilter=@keyring bpf

[Network]
VirtualEthernet=no

