# Kubelet's ContainerManager verifies (and by default tries to write) several
# sysctls at startup. Inside systemd-nspawn, /proc/sys is a read-only bind
# mount of the host's /proc/sys, so writes fail with EROFS. However, kubelet
# reads the current value first and skips the write if it already matches the
# expected value. By pre-setting these on the host, kubelet sees correct values
# and never attempts a write.
vm.overcommit_memory = 1
vm.panic_on_oom = 0
kernel.panic = 10
kernel.panic_on_oops = 1
kernel.keys.root_maxkeys = 1000000
kernel.keys.root_maxbytes = 25000000

# Network sysctls required by CNI plugins. With VirtualEthernet=no the
# container shares the host network namespace, so /proc/sys/net is also a
# read-only bind mount. Pre-setting these on the host avoids EROFS failures
# when CNI DaemonSet pods try to write them.
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.ipv4.ip_forward = 1
net.ipv4.conf.all.src_valid_mark = 1
net.ipv4.conf.default.src_valid_mark = 1
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0
