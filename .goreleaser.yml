version: 2

builds:
  - id: kubectl-unbounded
    main: ./cmd/kubectl-unbounded
    binary: kubectl-unbounded
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    hooks:
      pre:
        - make machina-manifests MACHINA_TAG={{ .Tag }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: unbounded-agent
    main: ./cmd/agent
    binary: unbounded-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/project-unbounded/unbounded-kube/internal/version.Version={{ .Version }}
      - -X github.com/project-unbounded/unbounded-kube/internal/version.GitCommit={{ .ShortCommit }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: kubectl-unbounded
    ids:
      - kubectl-unbounded
    formats:
      - tar.gz
    name_template: "kubectl-unbounded-{{ .Os }}-{{ .Arch }}"

  - id: unbounded-agent
    ids:
      - unbounded-agent
    formats:
      - tar.gz
    name_template: "unbounded-agent-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Sign the checksums file with cosign using keyless (Sigstore OIDC) signing.
# This ties the signature to the GitHub Actions OIDC identity — no long-lived keys required.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Generate an SPDX SBOM for each binary archive using syft.
sboms:
  - artifacts: archive
    args: ["$artifact", "--output", "spdx-json=$document"]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: project-unbounded
    name: unbounded-kube
  prerelease: auto
