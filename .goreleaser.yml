version: 2

builds:
  - id: kubectl-unbounded
    main: ./cmd/kubectl-unbounded
    binary: kubectl-unbounded
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    hooks:
      pre:
        - make machina-manifests MACHINA_TAG={{ .Tag }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: unbounded-agent
    main: ./cmd/agent
    binary: unbounded-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: kubectl-unbounded
    ids:
      - kubectl-unbounded
    formats:
      - tar.gz
    name_template: "kubectl-unbounded-{{ .Os }}-{{ .Arch }}"

  - id: unbounded-agent
    ids:
      - unbounded-agent
    formats:
      - tar.gz
    name_template: "unbounded-agent-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: project-unbounded
    name: unbounded-kube
  prerelease: auto
