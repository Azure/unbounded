#cloud-config

# User configuration
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: [sudo]
    lock_passwd: false
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__

# Package management
package_update: true
package_upgrade: false
packages:
  - curl
  - jq
  - apt-transport-https
  - ca-certificates
  - net-tools
  - vim

# Mount host repo into guest via virtio-9p
mounts:
  - ["agent", "/agent", "9p", "trans=virtio,version=9p2000.L,nofail", "0", "0"]

# Write files
write_files:
  # Enable serial console (ttyS0) for QEMU log capture on subsequent boots.
  # Cloud images may not have this enabled by default.
  - path: /etc/default/grub.d/99-serial-console.cfg
    content: |
      GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX console=ttyS0,115200n8"
    permissions: "0644"

# Run commands on first boot
runcmd:
  - mkdir -p /agent
  - mount -a
  - mkdir -p /etc/agent
  - |
    cat > /etc/agent/provisioned <<'EOF'
    provisioned=true
    EOF
  - update-grub
  - 'echo "cloud-init: done"'
