<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#34d399" stroke-width="1.5"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#34d399" stroke-width="1.5"/>
    </marker>
    <marker id="arrowRBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="360" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Bare-Metal Machine (left)                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="20" width="220" height="310" rx="10" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="140" y="48" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="700">Bare-Metal Machine</text>

  <!-- server rack icon -->
  <rect x="55" y="26" width="14" height="18" rx="2" fill="none" stroke="#34d399" stroke-width="0.9"/>
  <line x1="58" y1="31" x2="66" y2="31" stroke="#34d399" stroke-width="0.7"/>
  <line x1="58" y1="35" x2="66" y2="35" stroke="#34d399" stroke-width="0.7"/>
  <line x1="58" y1="39" x2="66" y2="39" stroke="#34d399" stroke-width="0.7"/>

  <!-- Boot sequence boxes (stacked) -->
  <rect x="55" y="65" width="170" height="30" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="140" y="85" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="500">PXE ROM</text>

  <line x1="140" y1="95" x2="140" y2="110" stroke="#2a2a2e" stroke-width="1"/>

  <rect x="55" y="110" width="170" height="30" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="140" y="130" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="500">bootloader</text>

  <line x1="140" y1="140" x2="140" y2="155" stroke="#2a2a2e" stroke-width="1"/>

  <rect x="55" y="155" width="170" height="30" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="140" y="175" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="500">kernel + initramfs</text>

  <line x1="140" y1="185" x2="140" y2="200" stroke="#2a2a2e" stroke-width="1"/>

  <rect x="55" y="200" width="170" height="30" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="140" y="220" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">kubelet</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- metalman (right)                                   -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="410" y="20" width="320" height="250" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="570" y="48" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="700">metalman</text>

  <!-- Server boxes row -->
  <rect x="435" y="65" width="80" height="34" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="475" y="87" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">DHCP</text>

  <rect x="530" y="65" width="80" height="34" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="570" y="87" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">TFTP</text>

  <rect x="625" y="65" width="80" height="34" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="665" y="87" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">HTTP</text>

  <!-- Machine CR & OCI info -->
  <rect x="435" y="120" width="270" height="60" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="445" y="142" fill="#e4e4e7" font-size="11" font-weight="600">Machine CR</text>
  <text x="445" y="162" fill="#a0a0a8" font-size="10">(NIC specs)</text>
  <text x="600" y="142" fill="#e4e4e7" font-size="11" font-weight="600">OCI boot images</text>
  <text x="600" y="162" fill="#a0a0a8" font-size="10">(kernel, initramfs, configs)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Protocol arrows between Machine and metalman       -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- DHCP arrow: Machine to metalman -->
  <line x1="225" y1="75" x2="430" y2="75" stroke="#34d399" stroke-width="1.5" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
  <rect x="295" y="62" width="60" height="18" rx="3" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="325" y="75" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">DHCP</text>

  <!-- TFTP arrow: metalman to Machine -->
  <line x1="225" y1="125" x2="430" y2="88" stroke="#34d399" stroke-width="1.5" marker-start="url(#arrowL)"/>
  <rect x="295" y="97" width="55" height="18" rx="3" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="322" y="110" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">TFTP</text>

  <!-- HTTP arrow: metalman to Machine -->
  <line x1="225" y1="170" x2="430" y2="100" stroke="#34d399" stroke-width="1.5" marker-start="url(#arrowL)"/>
  <rect x="295" y="130" width="55" height="18" rx="3" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="322" y="143" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">HTTP</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Kubernetes API connection                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="410" y="290" width="280" height="44" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="550" y="316" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">Kubernetes API</text>
  <text x="550" y="330" text-anchor="middle" fill="#a0a0a8" font-size="10">(bootstrap token)</text>

  <!-- Arrow from kubelet to Kubernetes API -->
  <line x1="225" y1="218" x2="405" y2="312" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowRBlue)"/>
</svg>
