<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Step 1: kubectl command                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="25" width="280" height="36" rx="6" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="170" y="48" text-anchor="middle" fill="#4d8eff" font-size="12" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">kubectl unbounded machine register</text>

  <!-- Arrow down -->
  <line x1="170" y1="61" x2="170" y2="85" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Step 2: Machine CR created                         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="90" y="90" width="160" height="36" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="170" y="113" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">Machine CR created</text>

  <!-- Arrow down -->
  <line x1="170" y1="126" x2="170" y2="150" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Step 3: machina reconciles                         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="80" y="155" width="180" height="36" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="170" y="178" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">machina reconciles</text>

  <!-- Arrow right to provisioning chain -->
  <line x1="260" y1="173" x2="320" y2="173" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Provisioning chain (right side)                    -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- TCP probe -->
  <rect x="325" y="155" width="110" height="36" rx="6" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="380" y="178" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">TCP probe</text>

  <line x1="435" y1="173" x2="465" y2="173" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- SSH connect -->
  <rect x="470" y="155" width="120" height="36" rx="6" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="530" y="178" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">SSH connect</text>

  <line x1="590" y1="173" x2="620" y2="173" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- Copy install script -->
  <rect x="625" y="155" width="130" height="36" rx="6" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="690" y="178" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">copy install script</text>

  <!-- Arrow down from copy -->
  <line x1="690" y1="191" x2="690" y2="225" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Execute script box (right side)                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="570" y="230" width="180" height="100" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="660" y="253" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">execute script</text>

  <!-- Script env vars -->
  <text x="590" y="275" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">API_SERVER</text>
  <text x="590" y="291" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">BOOTSTRAP_TOKEN</text>
  <text x="590" y="307" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">CA_CERT_BASE64</text>
  <text x="590" y="323" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">KUBE_VERSION</text>

  <!-- Arrow down from execute -->
  <line x1="660" y1="330" x2="660" y2="360" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- kubelet joins cluster                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="575" y="365" width="170" height="36" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="660" y="388" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">kubelet joins cluster</text>

  <!-- Long arrow left back to the left column -->
  <line x1="575" y1="395" x2="170" y2="395" stroke="#34d399" stroke-width="1.5"/>
  <line x1="170" y1="395" x2="170" y2="420" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Node appears with label                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="425" width="260" height="48" rx="8" fill="#18181b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="170" y="446" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">Node appears with label</text>
  <text x="170" y="464" text-anchor="middle" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">unbounded-cloud.io/machine=&lt;name&gt;</text>

  <!-- Arrow down -->
  <line x1="170" y1="473" x2="170" y2="490" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Machine phase Ready                                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="80" y="495" width="180" height="20" rx="4" fill="#18181b" stroke="#34d399" stroke-width="1"/>
  <text x="170" y="510" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">Machine phase -> Ready</text>
</svg>
