<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowD" markerWidth="7" markerHeight="5" refX="3.5" refY="5" orient="auto">
      <path d="M0,0 L3.5,5 L7,0" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
    <marker id="arrowU" markerWidth="7" markerHeight="5" refX="3.5" refY="0" orient="auto">
      <path d="M0,5 L3.5,0 L7,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="520" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Node A (source) - left column                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="25" y="15" width="340" height="475" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="195" y="38" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">Node A (source)</text>

  <!-- Pod (src) -->
  <rect x="100" y="50" width="150" height="28" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
  <text x="175" y="69" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">Pod (src)</text>
  <line x1="175" y1="78" x2="175" y2="92" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- cbr0 -->
  <rect x="120" y="95" width="110" height="26" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="175" y="113" text-anchor="middle" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">cbr0</text>
  <line x1="175" y1="121" x2="175" y2="135" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- kernel routing -->
  <rect x="80" y="138" width="190" height="32" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="175" y="155" text-anchor="middle" fill="#a0a0a8" font-size="10">kernel routing</text>
  <text x="175" y="165" text-anchor="middle" fill="#a0a0a8" font-size="8">(supernet route on unbounded0)</text>
  <line x1="175" y1="170" x2="175" y2="184" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- unbounded0 + TC egress BPF -->
  <rect x="80" y="187" width="190" height="32" rx="5" fill="#1e1e22" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.6"/>
  <text x="175" y="204" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">unbounded0</text>
  <text x="175" y="215" text-anchor="middle" fill="#a0a0a8" font-size="8">TC egress BPF</text>
  <line x1="175" y1="219" x2="175" y2="233" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- LPM lookup -->
  <rect x="80" y="236" width="190" height="28" rx="5" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="175" y="254" text-anchor="middle" fill="#a0a0a8" font-size="10">LPM lookup in <tspan fill="#a78bfa" font-weight="600">unbounded_endpoints_v4</tspan></text>
  <line x1="175" y1="264" x2="175" y2="278" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- set_tunnel_key -->
  <rect x="80" y="281" width="190" height="28" rx="5" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="175" y="299" text-anchor="middle" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">set_tunnel_key(remote_ip, vni)</text>
  <line x1="175" y1="309" x2="175" y2="323" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- derive inner dst MAC -->
  <rect x="80" y="326" width="190" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="175" y="344" text-anchor="middle" fill="#a0a0a8" font-size="10">derive inner dst MAC</text>
  <line x1="175" y1="354" x2="175" y2="368" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- bpf_redirect(geneve0) -->
  <rect x="80" y="371" width="190" height="28" rx="5" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="175" y="389" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">bpf_redirect(geneve0)</text>
  <line x1="175" y1="399" x2="175" y2="413" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- geneve0 (GENEVE encap) -->
  <rect x="100" y="416" width="150" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="175" y="434" text-anchor="middle" fill="#a0a0a8" font-size="10">geneve0 (GENEVE encap)</text>
  <line x1="175" y1="444" x2="175" y2="458" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- eth0 -->
  <rect x="120" y="461" width="110" height="24" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="175" y="478" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- UDP 6081 arrow across                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="230" y1="473" x2="508" y2="473" stroke="#4d8eff" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowR)"/>
  <rect x="345" y="497" width="68" height="18" rx="3" fill="#18181b" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="379" y="510" text-anchor="middle" fill="#4d8eff" font-size="9" font-weight="600">UDP 6081</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Node B (destination) - right column                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="395" y="15" width="340" height="475" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="565" y="38" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">Node B (destination)</text>

  <!-- eth0 -->
  <rect x="510" y="461" width="110" height="24" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="565" y="478" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>
  <line x1="565" y1="461" x2="565" y2="447" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowU)"/>

  <!-- geneve0 (decap) -->
  <rect x="490" y="416" width="150" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="565" y="434" text-anchor="middle" fill="#a0a0a8" font-size="10">geneve0 (GENEVE decap)</text>
  <line x1="565" y1="416" x2="565" y2="402" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowU)"/>

  <!-- kernel routing -->
  <rect x="470" y="371" width="190" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="565" y="389" text-anchor="middle" fill="#a0a0a8" font-size="10">kernel routing</text>
  <text x="565" y="383" text-anchor="middle" fill="#a0a0a8" font-size="8">(local table: dst on cbr0)</text>
  <line x1="565" y1="371" x2="565" y2="357" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowU)"/>

  <!-- cbr0 -->
  <rect x="510" y="326" width="110" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="565" y="344" text-anchor="middle" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">cbr0</text>
  <line x1="565" y1="326" x2="565" y2="312" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowU)"/>

  <!-- Pod (dst) -->
  <rect x="490" y="281" width="150" height="28" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
  <text x="565" y="300" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">Pod (dst)</text>
</svg>
