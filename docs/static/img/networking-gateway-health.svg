<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 160" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="160" rx="12" fill="#111113"/>

  <!-- Title -->
  <text x="370" y="25" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">Gateway Health State Machine</text>

  <!-- States -->
  <!-- New -->
  <rect x="20" y="60" width="70" height="34" rx="6" fill="#18181b" stroke="#a0a0a8" stroke-width="1.5"/>
  <text x="55" y="82" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="600">New</text>

  <!-- Arrow: New -> Healthy -->
  <line x1="90" y1="77" x2="148" y2="77" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="119" y="70" text-anchor="middle" fill="#a0a0a8" font-size="8">N successes</text>

  <!-- Healthy -->
  <rect x="155" y="60" width="90" height="34" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1.5"/>
  <text x="200" y="82" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">Healthy</text>

  <!-- Arrow: Healthy -> Degraded -->
  <line x1="245" y1="77" x2="303" y2="77" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="274" y="70" text-anchor="middle" fill="#a0a0a8" font-size="8">1 failure</text>

  <!-- Degraded -->
  <rect x="310" y="60" width="100" height="34" rx="6" fill="#18181b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="82" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Degraded</text>

  <!-- Arrow: Degraded -> Healthy (curve up) -->
  <path d="M360,60 C360,38 200,38 200,60" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="280" y="38" text-anchor="middle" fill="#34d399" font-size="8">success</text>

  <!-- Arrow: Degraded -> Unhealthy -->
  <line x1="410" y1="77" x2="468" y2="77" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="439" y="70" text-anchor="middle" fill="#a0a0a8" font-size="8">N failures</text>

  <!-- Unhealthy -->
  <rect x="475" y="55" width="105" height="44" rx="6" fill="#18181b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="527" y="77" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">Unhealthy</text>
  <text x="527" y="92" text-anchor="middle" fill="#a0a0a8" font-size="8">(deprioritized)</text>

  <!-- Arrow: Unhealthy -> Recovering -->
  <line x1="580" y1="77" x2="618" y2="77" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="599" y="70" text-anchor="middle" fill="#a0a0a8" font-size="8">1 success</text>

  <!-- Recovering -->
  <rect x="625" y="60" width="100" height="34" rx="6" fill="#18181b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="675" y="82" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Recovering</text>

  <!-- Arrow: Recovering -> Healthy (curve bottom) -->
  <path d="M675,94 C675,140 200,140 200,94" fill="none" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="437" y="148" text-anchor="middle" fill="#34d399" font-size="8">N successes</text>
</svg>
