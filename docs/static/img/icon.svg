<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="#111113"/>

  <!-- Triangle edges (dotted) -->
  <polygon points="32,12 10,47 54,47" fill="none" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="2,2.5" opacity="0.4"/>

  <!-- Vertex-to-center connections (dotted) -->
  <line x1="32" y1="16" x2="32" y2="28" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="2,2.5" opacity="0.7"/>
  <line x1="13" y1="45" x2="25" y2="36" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="2,2.5" opacity="0.7"/>
  <line x1="51" y1="45" x2="39" y2="36" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="2,2.5" opacity="0.7"/>

  <!-- Central node -->
  <rect x="23" y="27" width="18" height="14" rx="3.5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5"/>
  <circle cx="32" cy="34" r="2.5" fill="#4d8eff"/>

  <!-- Vertex nodes -->
  <rect x="26" y="7" width="12" height="10" rx="2.5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5"/>
  <circle cx="32" cy="12" r="2" fill="#4d8eff" opacity="0.6"/>

  <rect x="4" y="42" width="12" height="10" rx="2.5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5"/>
  <circle cx="10" cy="47" r="2" fill="#4d8eff" opacity="0.6"/>

  <rect x="48" y="42" width="12" height="10" rx="2.5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5"/>
  <circle cx="54" cy="47" r="2" fill="#4d8eff" opacity="0.6"/>
</svg>
