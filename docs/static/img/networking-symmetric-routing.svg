<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 220" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowD" markerWidth="7" markerHeight="5" refX="3.5" refY="5" orient="auto">
      <path d="M0,0 L3.5,5 L7,0" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="220" rx="12" fill="#111113"/>

  <!-- Title -->
  <text x="370" y="25" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="700">Symmetric Routing (connmark / fwmark)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Ingress (PREROUTING) - left                        -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="45" width="330" height="155" rx="10" fill="none" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="195" y="68" text-anchor="middle" fill="#4d8eff" font-size="12" font-weight="700">Ingress (PREROUTING)</text>

  <!-- Step 1 -->
  <rect x="50" y="80" width="290" height="30" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="60" y="99" fill="#a78bfa" font-size="11" font-weight="700">1.</text>
  <text x="78" y="99" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">CONNMARK --restore-mark</text>
  <line x1="195" y1="110" x2="195" y2="122" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- Step 2 -->
  <rect x="50" y="125" width="290" height="38" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="60" y="144" fill="#a78bfa" font-size="11" font-weight="700">2.</text>
  <text x="78" y="144" fill="#a0a0a8" font-size="10">For NEW pkts on wg&lt;port&gt;:</text>
  <text x="78" y="158" fill="#e4e4e7" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">CONNMARK --set-mark N</text>

  <!-- reply packets get fwmark annotation -->
  <text x="195" y="184" text-anchor="middle" fill="#a0a0a8" font-size="9" font-style="italic">(reply packets inherit fwmark)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Egress (OUTPUT) - right                            -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="390" y="45" width="330" height="155" rx="10" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="555" y="68" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">Egress (OUTPUT)</text>

  <!-- Step 3 -->
  <rect x="410" y="80" width="290" height="30" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="420" y="99" fill="#a78bfa" font-size="11" font-weight="700">3.</text>
  <text x="438" y="99" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">CONNMARK --restore-mark</text>
  <line x1="555" y1="110" x2="555" y2="122" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <!-- Step 4 -->
  <rect x="410" y="125" width="290" height="38" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="420" y="144" fill="#a78bfa" font-size="11" font-weight="700">4.</text>
  <text x="438" y="144" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">ip rule: fwmark N</text>
  <text x="438" y="158" fill="#e4e4e7" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">-> lookup table N</text>

  <!-- annotation -->
  <text x="555" y="184" text-anchor="middle" fill="#a0a0a8" font-size="9" font-style="italic">(routes out same WG interface)</text>
</svg>
