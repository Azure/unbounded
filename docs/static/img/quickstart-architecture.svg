<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#4d8eff" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#111113"/>

  <!-- AKS Cluster box -->
  <rect x="30" y="20" width="430" height="380" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="245" y="50" text-anchor="middle" fill="#e4e4e7" font-size="15" font-weight="700">AKS Cluster</text>

  <!-- System Pool -->
  <rect x="55" y="70" width="180" height="90" rx="8" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="145" y="95" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="600">System Pool</text>
  <!-- system node 1 -->
  <rect x="70" y="108" width="68" height="38" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="104" y="131" text-anchor="middle" fill="#a0a0a8" font-size="10">node</text>
  <!-- system node 2 -->
  <rect x="152" y="108" width="68" height="38" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="186" y="131" text-anchor="middle" fill="#a0a0a8" font-size="10">node</text>

  <!-- Gateway Pool -->
  <rect x="55" y="180" width="390" height="140" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="250" y="205" text-anchor="middle" fill="#4d8eff" font-size="12" font-weight="700">Gateway Pool (gwmain)</text>

  <!-- GW node 1 -->
  <rect x="75" y="220" width="155" height="80" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="152" y="245" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">Gateway Node 1</text>
  <!-- lock icon node 1 -->
  <rect x="120" y="256" width="14" height="10" rx="2" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <path d="M123,256 L123,251 A4,4 0 0,1 131,251 L131,256" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <text x="140" y="265" fill="#a0a0a8" font-size="9">WireGuard</text>
  <text x="152" y="288" text-anchor="middle" fill="#a0a0a8" font-size="9">Public IP</text>

  <!-- GW node 2 -->
  <rect x="260" y="220" width="155" height="80" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="337" y="245" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="600">Gateway Node 2</text>
  <!-- lock icon node 2 -->
  <rect x="305" y="256" width="14" height="10" rx="2" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <path d="M308,256 L308,251 A4,4 0 0,1 316,251 L316,256" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <text x="325" y="265" fill="#a0a0a8" font-size="9">WireGuard</text>
  <text x="337" y="288" text-anchor="middle" fill="#a0a0a8" font-size="9">Public IP</text>

  <!-- Components labels -->
  <rect x="55" y="340" width="115" height="30" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="112" y="360" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="600">unbounded-net</text>

  <rect x="185" y="340" width="80" height="30" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="225" y="360" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="600">machina</text>

  <text x="280" y="360" fill="#a0a0a8" font-size="10">NetworkPlugin=none</text>

  <!-- WireGuard tunnel lines -->
  <line x1="460" y1="250" x2="610" y2="250" stroke="#4d8eff" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowR)" marker-start="url(#arrowL)"/>
  <line x1="460" y1="270" x2="610" y2="270" stroke="#4d8eff" stroke-width="2" stroke-dasharray="8,5" opacity="0.4"/>

  <!-- Tunnel label -->
  <rect x="485" y="212" width="100" height="24" rx="4" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="535" y="228" text-anchor="middle" fill="#4d8eff" font-size="10" font-weight="600">WireGuard</text>
  <text x="535" y="298" text-anchor="middle" fill="#a0a0a8" font-size="9">UDP 51820-51899</text>
  <text x="535" y="312" text-anchor="middle" fill="#a0a0a8" font-size="9">encrypted</text>

  <!-- Remote Site box -->
  <rect x="610" y="20" width="260" height="380" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="740" y="50" text-anchor="middle" fill="#e4e4e7" font-size="15" font-weight="700">Remote Site</text>

  <!-- Remote node -->
  <rect x="645" y="200" width="190" height="120" rx="8" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="740" y="232" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">Your Node</text>

  <!-- lock icon remote -->
  <rect x="713" y="248" width="14" height="10" rx="2" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <path d="M716,248 L716,243 A4,4 0 0,1 724,243 L724,248" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
  <text x="740" y="276" text-anchor="middle" fill="#a0a0a8" font-size="10">unbounded agent</text>
  <text x="740" y="292" text-anchor="middle" fill="#a0a0a8" font-size="9">WireGuard tunnel</text>
  <text x="740" y="306" text-anchor="middle" fill="#a0a0a8" font-size="9">to gateway nodes</text>

  <!-- Remote site details -->
  <text x="740" y="82" text-anchor="middle" fill="#a0a0a8" font-size="10">e.g. on-prem, colo, edge,</text>
  <text x="740" y="96" text-anchor="middle" fill="#a0a0a8" font-size="10">GPU provider</text>

  <!-- Pod network label -->
  <rect x="645" y="340" width="190" height="30" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="740" y="360" text-anchor="middle" fill="#a0a0a8" font-size="10">pod networking via gateway</text>
</svg>
