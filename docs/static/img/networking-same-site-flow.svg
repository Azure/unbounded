<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="60" rx="10" fill="#111113"/>

  <!-- Flow items as a connected chain -->
  <!-- Pod A -->
  <rect x="8" y="16" width="46" height="26" rx="4" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
  <text x="31" y="34" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Pod A</text>

  <line x1="54" y1="29" x2="63" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- cbr0 -->
  <rect x="66" y="18" width="38" height="22" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="85" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">cbr0</text>

  <line x1="104" y1="29" x2="113" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- kernel routing -->
  <rect x="116" y="16" width="62" height="26" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="147" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8">routing</text>

  <line x1="178" y1="29" x2="187" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- unbounded0 + BPF -->
  <rect x="190" y="12" width="120" height="34" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.6"/>
  <text x="250" y="27" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">unbounded0</text>
  <text x="250" y="39" text-anchor="middle" fill="#a0a0a8" font-size="7">TC egress BPF -> LPM</text>

  <line x1="310" y1="29" x2="319" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- set_tunnel_key + redirect -->
  <rect x="322" y="12" width="106" height="34" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="375" y="27" text-anchor="middle" fill="#a0a0a8" font-size="7">set_tunnel_key</text>
  <text x="375" y="39" text-anchor="middle" fill="#a0a0a8" font-size="7">bpf_redirect(geneve0)</text>

  <line x1="428" y1="29" x2="437" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- GENEVE encap -->
  <rect x="440" y="16" width="60" height="26" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="470" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8">encap</text>

  <line x1="500" y1="29" x2="509" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- eth0 -> LAN -> eth0 -->
  <rect x="512" y="16" width="38" height="26" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="531" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>

  <line x1="550" y1="29" x2="559" y2="29" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="562" y="20" width="40" height="18" rx="3" fill="#18181b" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="582" y="33" text-anchor="middle" fill="#4d8eff" font-size="7" font-weight="600">LAN</text>

  <line x1="602" y1="29" x2="611" y2="29" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="614" y="16" width="38" height="26" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="633" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>

  <line x1="652" y1="29" x2="661" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- decap -->
  <rect x="664" y="16" width="48" height="26" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="688" y="33" text-anchor="middle" fill="#a0a0a8" font-size="8">decap</text>

  <line x1="712" y1="29" x2="721" y2="29" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowR)"/>

  <!-- cbr0 -> Pod B -->
  <rect x="724" y="18" width="26" height="22" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="737" y="33" text-anchor="middle" fill="#a0a0a8" font-size="7">cbr</text>

  <line x1="750" y1="29" x2="755" y2="29" stroke="#4d8eff" stroke-width="1"/>

  <rect x="755" y="16" width="40" height="26" rx="4" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
  <text x="775" y="34" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Pod B</text>

  <!-- UDP 6081 label -->
  <text x="582" y="13" text-anchor="middle" fill="#a0a0a8" font-size="7">UDP 6081</text>
</svg>
