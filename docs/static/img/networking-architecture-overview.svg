<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Tier 1: Control Plane                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="15" width="640" height="140" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="55" y="38" fill="#a0a0a8" font-size="11" font-weight="600">Control Plane</text>

  <!-- Controller box -->
  <rect x="55" y="48" width="590" height="95" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="75" y="70" fill="#e4e4e7" font-size="12" font-weight="700">unbounded-net-controller</text>
  <text x="310" y="70" fill="#a0a0a8" font-size="10">(Leader Elected)</text>

  <!-- Site Controller sub-box -->
  <rect x="75" y="80" width="260" height="52" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="90" y="97" fill="#e4e4e7" font-size="11" font-weight="600">Site Controller</text>
  <text x="90" y="113" fill="#a0a0a8" font-size="9">Labels nodes, assigns podCIDRs</text>
  <text x="90" y="125" fill="#a0a0a8" font-size="9">Creates SiteNodeSlice objects</text>

  <!-- GatewayPool Controller sub-box -->
  <rect x="355" y="80" width="270" height="52" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="370" y="97" fill="#e4e4e7" font-size="11" font-weight="600">GatewayPool Controller</text>
  <text x="370" y="113" fill="#a0a0a8" font-size="9">Updates GatewayPool status</text>
  <text x="370" y="125" fill="#a0a0a8" font-size="9">Creates GatewayPoolNode objects</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Tier 2: Custom Resources                           -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="170" width="640" height="100" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="55" y="193" fill="#a0a0a8" font-size="11" font-weight="600">Custom Resources</text>

  <!-- CRD pills row 1 -->
  <rect x="55" y="202" width="65" height="24" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="87" y="218" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">Site</text>

  <rect x="130" y="202" width="110" height="24" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="185" y="218" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">SiteNodeSlice</text>

  <rect x="250" y="202" width="105" height="24" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="302" y="218" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">GatewayPool</text>

  <rect x="365" y="202" width="125" height="24" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="427" y="218" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">GatewayPoolNode</text>

  <!-- CRD pills row 2 -->
  <rect x="55" y="236" width="100" height="24" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="105" y="252" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">SitePeering</text>

  <rect x="165" y="236" width="200" height="24" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="265" y="252" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">SiteGatewayPoolAssignment</text>

  <rect x="375" y="236" width="150" height="24" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="450" y="252" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">GatewayPoolPeering</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Tier 3: Data Plane (per Node)                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="290" width="640" height="215" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="55" y="313" fill="#a0a0a8" font-size="11" font-weight="600">Data Plane (per Node)</text>

  <!-- Node Agent box -->
  <rect x="55" y="323" width="590" height="170" rx="8" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="75" y="345" fill="#e4e4e7" font-size="12" font-weight="700">Node Agent</text>
  <text x="170" y="345" fill="#a0a0a8" font-size="10">(DaemonSet)</text>

  <!-- Sub-components grid -->
  <!-- CNI bridge config -->
  <rect x="75" y="358" width="150" height="34" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="150" y="380" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">CNI bridge config</text>

  <!-- WireGuard -->
  <rect x="240" y="358" width="190" height="34" rx="6" fill="#1e1e22" stroke="#4d8eff" stroke-width="1" stroke-opacity="0.5"/>
  <!-- lock icon -->
  <rect x="252" y="368" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <path d="M254,368 L254,366 A2,2 0 0,1 258,366 L258,368" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <text x="268" y="380" fill="#e4e4e7" font-size="10" font-weight="500">WireGuard interface mgmt</text>

  <!-- Gateway health -->
  <rect x="445" y="358" width="185" height="34" rx="6" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="537" y="380" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">Gateway health monitoring</text>

  <!-- eBPF section (larger) -->
  <rect x="75" y="402" width="555" height="80" rx="6" fill="#1e1e22" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="422" fill="#a78bfa" font-size="11" font-weight="600">eBPF</text>

  <!-- unbounded0 -->
  <rect x="95" y="432" width="120" height="28" rx="5" fill="#18181b" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="155" y="451" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">unbounded0</text>

  <!-- TC egress BPF -->
  <text x="230" y="451" fill="#a0a0a8" font-size="10">+ TC egress BPF program</text>

  <!-- Arrow to tunnels -->
  <text x="420" y="422" fill="#a0a0a8" font-size="10">LPM trie maps -></text>

  <!-- Tunnel interfaces -->
  <rect x="420" y="432" width="70" height="24" rx="4" fill="#18181b" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="455" y="449" text-anchor="middle" fill="#a0a0a8" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">geneve0</text>

  <rect x="498" y="432" width="60" height="24" rx="4" fill="#18181b" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="528" y="449" text-anchor="middle" fill="#a0a0a8" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">vxlan0</text>

  <rect x="566" y="432" width="50" height="24" rx="4" fill="#18181b" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="591" y="449" text-anchor="middle" fill="#a0a0a8" font-size="9" font-family="'SF Mono', 'Fira Code', monospace">ipip0</text>
</svg>
