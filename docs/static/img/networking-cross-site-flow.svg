<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowD" markerWidth="7" markerHeight="5" refX="3.5" refY="5" orient="auto">
      <path d="M0,0 L3.5,5 L7,0" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="280" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Site 1 Worker                                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="15" y="15" width="175" height="250" rx="8" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="102" y="35" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="700">Site 1 Worker</text>

  <rect x="30" y="44" width="145" height="22" rx="4" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="102" y="59" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Pod A (src)</text>

  <line x1="102" y1="66" x2="102" y2="76" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <text x="102" y="90" text-anchor="middle" fill="#a0a0a8" font-size="8">cbr0 -> unbounded0</text>

  <line x1="102" y1="95" x2="102" y2="105" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="30" y="108" width="145" height="28" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="102" y="126" text-anchor="middle" fill="#a78bfa" font-size="8">BPF -> redirect(wg51821)</text>

  <line x1="102" y1="136" x2="102" y2="146" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="30" y="149" width="145" height="28" rx="4" fill="#1e1e22" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- lock icon -->
  <rect x="40" y="157" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <path d="M42,157 L42,155 A2,2 0 0,1 46,155 L46,157" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <text x="55" y="167" fill="#4d8eff" font-size="8" font-weight="600">WireGuard encrypt</text>

  <line x1="102" y1="177" x2="102" y2="187" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <text x="102" y="200" text-anchor="middle" fill="#a0a0a8" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>

  <!-- LAN arrow to gateway 1 -->
  <line x1="190" y1="200" x2="212" y2="200" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="200" y="218" text-anchor="middle" fill="#a0a0a8" font-size="7">LAN</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Site 1 Gateway                                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="215" y="15" width="175" height="250" rx="8" fill="none" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="302" y="35" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="700">Site 1 Gateway</text>

  <rect x="230" y="44" width="145" height="22" rx="4" fill="#1e1e22" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="302" y="59" text-anchor="middle" fill="#a0a0a8" font-size="8">wg51821 (decrypt)</text>

  <line x1="302" y1="66" x2="302" y2="76" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="230" y="79" width="145" height="22" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="302" y="94" text-anchor="middle" fill="#a78bfa" font-size="8">unbounded0 -> BPF</text>

  <line x1="302" y1="101" x2="302" y2="111" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="230" y="114" width="145" height="22" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="302" y="129" text-anchor="middle" fill="#a78bfa" font-size="8">redirect(wg51822)</text>

  <line x1="302" y1="136" x2="302" y2="146" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="230" y="149" width="145" height="28" rx="4" fill="#1e1e22" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="240" y="157" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <path d="M242,157 L242,155 A2,2 0 0,1 246,155 L246,157" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <text x="255" y="167" fill="#4d8eff" font-size="8" font-weight="600">WireGuard encrypt</text>

  <line x1="302" y1="177" x2="302" y2="187" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <text x="302" y="200" text-anchor="middle" fill="#a0a0a8" font-size="8">eth0 (public IP)</text>

  <!-- WAN arrow to gateway 2 -->
  <line x1="390" y1="200" x2="412" y2="200" stroke="#4d8eff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowR)"/>
  <text x="400" y="218" text-anchor="middle" fill="#4d8eff" font-size="7" font-weight="600">WAN</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Site 2 Gateway                                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="415" y="15" width="195" height="250" rx="8" fill="none" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="512" y="35" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="700">Site 2 Gateway</text>

  <rect x="430" y="44" width="165" height="22" rx="4" fill="#1e1e22" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="512" y="59" text-anchor="middle" fill="#a0a0a8" font-size="8">wg (decrypt)</text>

  <line x1="512" y1="66" x2="512" y2="76" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="430" y="79" width="165" height="22" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="512" y="94" text-anchor="middle" fill="#a78bfa" font-size="8">unbounded0 -> BPF</text>

  <line x1="512" y1="101" x2="512" y2="111" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="430" y="114" width="165" height="22" rx="4" fill="#1e1e22" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="512" y="129" text-anchor="middle" fill="#a78bfa" font-size="8">set_tunnel_key -> redirect(geneve0)</text>

  <line x1="512" y1="136" x2="512" y2="146" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="430" y="149" width="165" height="28" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="512" y="167" text-anchor="middle" fill="#a0a0a8" font-size="8">GENEVE encap</text>

  <line x1="512" y1="177" x2="512" y2="187" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <text x="512" y="200" text-anchor="middle" fill="#a0a0a8" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">eth0</text>

  <!-- LAN arrow to worker 2 -->
  <line x1="610" y1="200" x2="632" y2="200" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="620" y="218" text-anchor="middle" fill="#a0a0a8" font-size="7">LAN</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Site 2 Worker                                      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="635" y="15" width="175" height="250" rx="8" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="722" y="35" text-anchor="middle" fill="#e4e4e7" font-size="11" font-weight="700">Site 2 Worker</text>

  <rect x="650" y="44" width="145" height="22" rx="4" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="722" y="59" text-anchor="middle" fill="#a0a0a8" font-size="8">geneve0 (decap)</text>

  <line x1="722" y1="66" x2="722" y2="76" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <text x="722" y="90" text-anchor="middle" fill="#a0a0a8" font-size="8">kernel -> cbr0</text>

  <line x1="722" y1="95" x2="722" y2="105" stroke="#4d8eff" stroke-width="1" marker-end="url(#arrowD)"/>

  <rect x="650" y="108" width="145" height="22" rx="4" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="722" y="123" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Pod B (dst)</text>
</svg>
