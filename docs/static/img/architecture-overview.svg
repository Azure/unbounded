<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="none" stroke="#a0a0a8" stroke-width="1.5"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,6 L4,0 L8,6" fill="none" stroke="#a0a0a8" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="420" rx="12" fill="#111113"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Control-Plane Cluster                              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="160" y="20" width="420" height="150" rx="10" fill="none" stroke="#2a2a2e" stroke-width="1.5"/>
  <text x="370" y="48" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="700">Control-Plane Cluster</text>

  <!-- machina box -->
  <rect x="210" y="65" width="120" height="40" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="270" y="90" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">machina</text>

  <!-- metalman box -->
  <rect x="410" y="65" width="120" height="40" rx="6" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="470" y="90" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">metalman</text>

  <!-- Machine CRDs label -->
  <rect x="280" y="125" width="180" height="28" rx="5" fill="#1e1e22" stroke="#2a2a2e" stroke-width="1"/>
  <text x="370" y="144" text-anchor="middle" fill="#a0a0a8" font-size="11" font-weight="500">Machine CRDs</text>

  <!-- Lines from controllers to CRDs -->
  <line x1="270" y1="105" x2="340" y2="125" stroke="#2a2a2e" stroke-width="1"/>
  <line x1="470" y1="105" x2="400" y2="125" stroke="#2a2a2e" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Provisioning lines                                 -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- SSH line (left) -->
  <line x1="270" y1="170" x2="200" y2="250" stroke="#4d8eff" stroke-width="2" marker-end="url(#arrowDown)"/>
  <!-- SSH label -->
  <rect x="185" y="195" width="100" height="22" rx="4" fill="#18181b" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="235" y="210" text-anchor="middle" fill="#4d8eff" font-size="10" font-weight="600">SSH (TCP/22)</text>

  <!-- PXE line (right) -->
  <line x1="470" y1="170" x2="540" y2="250" stroke="#34d399" stroke-width="2" marker-end="url(#arrowDown)"/>
  <!-- PXE label -->
  <rect x="450" y="195" width="140" height="22" rx="4" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="520" y="210" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">PXE (DHCP/TFTP/HTTP)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Node boxes                                         -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Remote Node -->
  <rect x="100" y="255" width="200" height="60" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="200" y="282" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">Remote Node</text>
  <text x="200" y="300" text-anchor="middle" fill="#a0a0a8" font-size="10">(cloud / edge)</text>

  <!-- Bare-Metal Node -->
  <rect x="440" y="255" width="200" height="60" rx="8" fill="#18181b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="540" y="282" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">Bare-Metal Node</text>
  <text x="540" y="300" text-anchor="middle" fill="#a0a0a8" font-size="10">(on-prem / edge)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- WireGuard / Gateway section                        -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- WireGuard lines from nodes down -->
  <line x1="200" y1="315" x2="310" y2="355" stroke="#4d8eff" stroke-width="2" stroke-dasharray="8,5" opacity="0.7"/>
  <line x1="540" y1="315" x2="430" y2="355" stroke="#4d8eff" stroke-width="2" stroke-dasharray="8,5" opacity="0.7"/>

  <!-- WireGuard label -->
  <rect x="305" y="330" width="130" height="22" rx="4" fill="#18181b" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- lock icon -->
  <rect x="313" y="334" width="10" height="8" rx="1.5" fill="none" stroke="#4d8eff" stroke-width="1"/>
  <path d="M315,334 L315,331 A3,3 0 0,1 321,331 L321,334" fill="none" stroke="#4d8eff" stroke-width="1"/>
  <text x="330" y="345" fill="#4d8eff" font-size="10" font-weight="600">WireGuard UDP</text>

  <!-- Gateway Nodes box -->
  <rect x="270" y="360" width="200" height="44" rx="8" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="370" y="382" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">Gateway Nodes</text>
  <text x="370" y="397" text-anchor="middle" fill="#a0a0a8" font-size="10">(UDP/51820-51899)</text>
</svg>
