  <text x="155" y="402" fill="#4d8eff" font-size="9" font-weight="600">cloud-init</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- AI INFRASTRUCTURE (bottom right)                        -->
  <!-- ════════════════════════════════════════════════════════ -->

  <rect x="680" y="315" width="220" height="130" rx="10" fill="url(#site-fill)" stroke="#2a2a2e" stroke-width="1.5"/>

  <!-- GPU/chip icon (scaled to match bare metal icon ~36px) -->
  <g transform="translate(696, 333) scale(1.3)">
    <!-- chip body -->
    <rect x="6" y="4" width="24" height="20" rx="3" fill="#18181b" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.7"/>
    <!-- die -->
    <rect x="12" y="9" width="12" height="10" rx="1.5" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="0.5"/>
    <!-- pins left -->
    <line x1="2" y1="10" x2="6" y2="10" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="2" y1="15" x2="6" y2="15" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="2" y1="20" x2="6" y2="20" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- pins right -->
