    <rect x="20" y="12" width="5" height="5" rx="1" fill="#4d8eff" opacity="0.2" stroke="#4d8eff" stroke-width="0.4"/>
    <rect x="16" y="6" width="5" height="5" rx="1" fill="#4d8eff" opacity="0.2" stroke="#4d8eff" stroke-width="0.4"/>
  </g>

  <text x="128" y="356" fill="#e4e4e7" font-size="15" font-weight="700">Public Cloud</text>
  <text x="128" y="374" fill="#a0a0a8" font-size="10">AWS, Azure, GCP instances</text>

  <!-- cloud-init badge -->
  <rect x="128" y="388" width="82" height="20" rx="4" fill="#18181b" stroke="#4d8eff" stroke-width="0.8" stroke-opacity="0.5"/>
