<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Subtle glow for control plane -->
    <radialGradient id="cp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4d8eff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4d8eff" stop-opacity="0"/>
    </radialGradient>
    <!-- Site box gradient fills (darker than hero bg #141416) -->
    <linearGradient id="site-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
  </defs>

  <!-- Background: transparent so hero bg (#141416) shows through -->
  <rect width="960" height="480" fill="none"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- Site-to-site connections (triangle edges, subtle)       -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Bare Metal <-> Public Cloud (left edge) -->
  <line x1="370" y1="160" x2="230" y2="315" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Bare Metal <-> AI Infra (right edge) -->
  <line x1="590" y1="160" x2="730" y2="315" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Public Cloud <-> AI Infra (bottom edge) -->
  <line x1="280" y1="385" x2="680" y2="385" stroke="#4d8eff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- Primary connections (center to vertices)                -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Control Plane <-> Bare Metal: Direct L3 (solid green) -->
  <line x1="480" y1="205" x2="480" y2="160" stroke="#34d399" stroke-width="2.5" opacity="0.8"/>
  <!-- Direct L3 label -->
  <rect x="498" y="172" width="68" height="18" rx="3" fill="#141416" fill-opacity="0.9"/>
  <text x="532" y="185" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Direct L3</text>

  <!-- Control Plane <-> Public Cloud: WireGuard (dashed blue) -->
  <line x1="370" y1="300" x2="280" y2="340" stroke="#4d8eff" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.7"/>
  <!-- WG label left -->
  <rect x="280" y="305" width="72" height="18" rx="3" fill="#141416" fill-opacity="0.9"/>
  <!-- lock icon -->
  <rect x="287" y="309" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <path d="M289,309 L289,306.5 A2.5,2.5 0 0,1 294,306.5 L294,309" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <text x="322" y="319" text-anchor="middle" fill="#4d8eff" font-size="9" font-weight="600">WireGuard</text>

  <!-- Control Plane <-> AI Infra: WireGuard (dashed blue) -->
  <line x1="590" y1="300" x2="680" y2="340" stroke="#4d8eff" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.7"/>
  <!-- WG label right -->
  <rect x="608" y="305" width="72" height="18" rx="3" fill="#141416" fill-opacity="0.9"/>
  <!-- lock icon -->
  <rect x="615" y="309" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <path d="M617,309 L617,306.5 A2.5,2.5 0 0,1 622,306.5 L622,309" fill="none" stroke="#4d8eff" stroke-width="0.8"/>
  <text x="650" y="319" text-anchor="middle" fill="#4d8eff" font-size="9" font-weight="600">WireGuard</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- CONTROL PLANE (center)                                  -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- Glow backdrop -->
  <circle cx="480" cy="270" r="110" fill="url(#cp-glow)"/>

  <!-- Control plane box (same size as site boxes: 220x130) -->
  <rect x="370" y="205" width="220" height="130" rx="10" fill="#0e0e10" stroke="#2a2a2e" stroke-width="1.5"/>

  <!-- Kubernetes ship wheel (helm) icon — official K8s logo -->
  <!-- Source: https://github.com/kubernetes/kubernetes/blob/master/logo/logo.svg -->
  <!-- Scaled to ~50px tall, positioned left of text in control plane box -->
  <g transform="translate(382, 220) scale(0.068)">
