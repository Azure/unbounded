  <text x="440" y="248" fill="#e4e4e7" font-size="15" font-weight="700">Control Plane</text>
  <text x="440" y="266" fill="#a0a0a8" font-size="10">Kubernetes API Server</text>

  <!-- Gateway nodes sub-label -->
  <rect x="440" y="285" width="130" height="22" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="505" y="300" text-anchor="middle" fill="#a0a0a8" font-size="10" font-weight="500">Gateway Nodes</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- BARE METAL (top center)                                 -->
  <!-- ════════════════════════════════════════════════════════ -->

  <rect x="370" y="30" width="220" height="130" rx="10" fill="url(#site-fill)" stroke="#2a2a2e" stroke-width="1.5"/>

  <!-- Server rack icon (3 stacked 1U servers) -->
  <g transform="translate(390, 52)">
    <rect x="0" y="0" width="36" height="10" rx="2" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="28" cy="5" r="2" fill="#34d399" opacity="0.7"/>
    <rect x="4" y="3" width="12" height="4" rx="1" fill="#34d399" opacity="0.15"/>

    <rect x="0" y="14" width="36" height="10" rx="2" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="28" cy="19" r="2" fill="#34d399" opacity="0.7"/>
    <rect x="4" y="17" width="12" height="4" rx="1" fill="#34d399" opacity="0.15"/>

    <rect x="0" y="28" width="36" height="10" rx="2" fill="#18181b" stroke="#34d399" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="28" cy="33" r="2" fill="#34d399" opacity="0.7"/>
    <rect x="4" y="31" width="12" height="4" rx="1" fill="#34d399" opacity="0.15"/>
  </g>

  <text x="440" y="68" fill="#e4e4e7" font-size="15" font-weight="700">Bare Metal</text>
  <text x="440" y="86" fill="#a0a0a8" font-size="10">On-prem servers, colocations</text>

  <!-- PXE Boot badge -->
  <rect x="440" y="100" width="70" height="20" rx="4" fill="#18181b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- small network boot icon -->
  <path d="M449,110 L453,106 L457,110" fill="none" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
  <line x1="453" y1="106" x2="453" y2="114" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
  <text x="461" y="114" fill="#34d399" font-size="9" font-weight="600">PXE Boot</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PUBLIC CLOUD (bottom left)                              -->
  <!-- ════════════════════════════════════════════════════════ -->

  <rect x="60" y="315" width="220" height="130" rx="10" fill="url(#site-fill)" stroke="#2a2a2e" stroke-width="1.5"/>

  <!-- Cloud icon (scaled to match bare metal icon ~36px) -->
  <g transform="translate(68, 342) scale(1.4)">
    <path d="M8,22 A8,8 0 0,1 8,8 A10,8 0 0,1 28,8 A8,6 0 0,1 36,16 A6,6 0 0,1 30,22 Z"
