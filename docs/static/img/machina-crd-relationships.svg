<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4d8eff" stroke-width="1.2"/>
    </marker>
    <marker id="arrowL" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M7,0 L0,2.5 L7,5" fill="none" stroke="#34d399" stroke-width="1.2"/>
    </marker>
    <marker id="arrowRGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#34d399" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="260" rx="12" fill="#111113"/>

  <!-- Title -->
  <text x="340" y="25" text-anchor="middle" fill="#e4e4e7" font-size="14" font-weight="700">Machine CRD Relationships</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Left column: Machine spec fields                   -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Machine.spec.pxe.image -->
  <rect x="20" y="45" width="285" height="26" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="30" y="63" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">Machine.spec.pxe.image</text>

  <!-- Machine.spec.ssh.privateKeyRef -->
  <rect x="20" y="82" width="285" height="26" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="30" y="100" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">Machine.spec.ssh.privateKeyRef</text>

  <!-- Machine.spec.pxe.redfish.passwordRef -->
  <rect x="20" y="119" width="285" height="26" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="30" y="137" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">Machine.spec.pxe.redfish.passwordRef</text>

  <!-- Machine.spec.kubernetes.bootstrapTokenRef -->
  <rect x="20" y="156" width="285" height="26" rx="5" fill="#18181b" stroke="#2a2a2e" stroke-width="1"/>
  <text x="30" y="174" fill="#a0a0a8" font-size="10" font-family="'SF Mono', 'Fira Code', monospace">Machine.spec.kubernetes.bootstrapTokenRef</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Right column: Targets                              -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- OCI Image -->
  <rect x="490" y="45" width="170" height="26" rx="5" fill="#18181b" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="575" y="63" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">OCI Image</text>

  <!-- Secret (unbounded-kube) -->
  <rect x="490" y="82" width="170" height="26" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- lock icon -->
  <rect x="502" y="89" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <path d="M504,89 L504,87 A2,2 0 0,1 508,87 L508,89" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <text x="518" y="100" fill="#4d8eff" font-size="11" font-weight="600">Secret</text>
  <text x="565" y="100" fill="#a0a0a8" font-size="9">(unbounded-kube)</text>

  <!-- Secret -->
  <rect x="490" y="119" width="170" height="26" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="502" y="126" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <path d="M504,126 L504,124 A2,2 0 0,1 508,124 L508,126" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <text x="518" y="137" fill="#4d8eff" font-size="11" font-weight="600">Secret</text>

  <!-- Secret (kube-system) -->
  <rect x="490" y="156" width="170" height="26" rx="5" fill="#18181b" stroke="#4d8eff" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="502" y="163" width="8" height="6" rx="1" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <path d="M504,163 L504,161 A2,2 0 0,1 508,161 L508,163" fill="none" stroke="#4d8eff" stroke-width="0.7"/>
  <text x="518" y="174" fill="#4d8eff" font-size="11" font-weight="600">Secret</text>
  <text x="565" y="174" fill="#a0a0a8" font-size="9">(kube-system)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Arrows: spec fields -> targets                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="305" y1="58" x2="483" y2="58" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="305" y1="95" x2="483" y2="95" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="305" y1="132" x2="483" y2="132" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="305" y1="169" x2="483" y2="169" stroke="#4d8eff" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Bidirectional: Machine <-> Node                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="120" y="210" width="110" height="34" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="175" y="232" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">Machine</text>

  <rect x="450" y="210" width="100" height="34" rx="6" fill="#18181b" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="500" y="232" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">Node</text>

  <!-- Bidirectional arrows -->
  <line x1="230" y1="222" x2="443" y2="222" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowRGreen)"/>
  <line x1="450" y1="232" x2="237" y2="232" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowL)"/>

  <!-- Label -->
  <rect x="275" y="215" width="155" height="16" rx="3" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.8"/>
  <text x="352" y="227" text-anchor="middle" fill="#34d399" font-size="8" font-family="'SF Mono', 'Fira Code', monospace">unbounded-cloud.io/machine</text>
  <text x="352" y="246" text-anchor="middle" fill="#a0a0a8" font-size="9">(bidirectional via label)</text>
</svg>
