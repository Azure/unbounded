{{- if not .IsHome -}}
<nav class="breadcrumbs" aria-label="Breadcrumbs">
  <ol>
    <li><a href="{{ "" | relURL }}">Docs</a></li>
    {{- range (.Ancestors.Reverse) }}
      {{- if not .IsHome }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{- end }}
    {{- end }}
    <li aria-current="page">{{ .Title }}</li>
  </ol>
</nav>
{{- end -}}
