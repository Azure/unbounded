<!DOCTYPE html>
<html lang="en">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{- partial "header.html" . -}}
  <main>
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    var copyIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    var checkIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    document.querySelectorAll("pre").forEach(function (pre) {
      var btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.title = "Copy";
      btn.innerHTML = copyIcon;
      btn.addEventListener("click", function () {
        var code = pre.querySelector("code");
        var text = (code || pre).textContent;
        navigator.clipboard.writeText(text).then(function () {
          btn.innerHTML = checkIcon;
          setTimeout(function () { btn.innerHTML = copyIcon; }, 1500);
        });
      });
      pre.appendChild(btn);
    });

    // ── TOC active-heading tracking ──────────────────────────
    var toc = document.querySelector(".toc-sidebar #TableOfContents");
    if (toc) {
      var tocLinks = toc.querySelectorAll("a");
      var headings = [];
      tocLinks.forEach(function (link) {
        var id = decodeURIComponent(link.getAttribute("href").slice(1));
        var el = document.getElementById(id);
        if (el) headings.push({ el: el, link: link });
      });

      function updateActive() {
        var scrollY = window.scrollY;
        var offset = 100;
        var current = null;
        for (var i = 0; i < headings.length; i++) {
          if (headings[i].el.getBoundingClientRect().top + window.scrollY - offset <= scrollY) {
            current = headings[i];
          }
        }
        tocLinks.forEach(function (l) { l.classList.remove("active"); });
        if (current) current.link.classList.add("active");
      }

      window.addEventListener("scroll", updateActive, { passive: true });
      updateActive();
    }
  });
  </script>
</body>
</html>
