name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload manifests
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf dist/deploy.tar.gz deploy/
          gh release upload "${VERSION}" dist/deploy.tar.gz --clobber

          make images/ubuntu24/image.yaml
          gh release upload "${VERSION}" images/ubuntu24/image.yaml#ubuntu24-image.yaml --clobber

          export VERSION="${GITHUB_REF_NAME}"
          export REPO="project-unbounded/unbounded-kube"
          export SHA_LINUX_AMD64=$(sha256sum dist/kubectl-unbounded-linux-amd64.tar.gz | awk '{print $1}')
          export SHA_LINUX_ARM64=$(sha256sum dist/kubectl-unbounded-linux-arm64.tar.gz | awk '{print $1}')
          export SHA_DARWIN_AMD64=$(sha256sum dist/kubectl-unbounded-darwin-amd64.tar.gz | awk '{print $1}')
          export SHA_DARWIN_ARM64=$(sha256sum dist/kubectl-unbounded-darwin-arm64.tar.gz | awk '{print $1}')
          envsubst < hack/krew-manifest.yaml > dist/unbounded.yaml
          gh release upload "${VERSION}" dist/unbounded.yaml --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  images:
    runs-on: ubuntu-latest
    env:
      CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}
    strategy:
      matrix:
        component:
          - name: machina
            file: images/machina/Containerfile
          - name: metalman
            file: images/metalman/Containerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.file }}
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}:${{ github.ref_name }}
            ${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}:latest
