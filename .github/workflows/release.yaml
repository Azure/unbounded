name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  packages: write
  # Required for keyless cosign signing via Sigstore OIDC.
  id-token: write
  # Required for attaching SBOMs and provenance attestations.
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload manifests
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf dist/deploy.tar.gz deploy/
          gh release upload "${VERSION}" dist/deploy.tar.gz --clobber

          export VERSION="${GITHUB_REF_NAME}"
          export REPO="project-unbounded/unbounded-kube"
          export SHA_LINUX_AMD64=$(sha256sum dist/kubectl-unbounded-linux-amd64.tar.gz | awk '{print $1}')
          export SHA_LINUX_ARM64=$(sha256sum dist/kubectl-unbounded-linux-arm64.tar.gz | awk '{print $1}')
          export SHA_DARWIN_AMD64=$(sha256sum dist/kubectl-unbounded-darwin-amd64.tar.gz | awk '{print $1}')
          export SHA_DARWIN_ARM64=$(sha256sum dist/kubectl-unbounded-darwin-arm64.tar.gz | awk '{print $1}')
          envsubst < hack/krew-manifest.yaml > dist/unbounded.yaml
          gh release upload "${VERSION}" dist/unbounded.yaml --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  images:
    runs-on: ubuntu-latest
    env:
      CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}
    strategy:
      matrix:
        component:
          - name: machina
            file: images/machina/Containerfile
          - name: metalman
            file: images/metalman/Containerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.component.file }}
          push: false
          load: true
          tags: scan/${{ matrix.component.name }}:${{ github.ref_name }}

      - name: Scan with Trivy before pushing
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: scan/${{ matrix.component.name }}:${{ github.ref_name }}
          format: table
          severity: CRITICAL,HIGH
          # Fail the release if critical or high CVEs are found in the final image.
          exit-code: "1"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.component.file }}
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}:${{ github.ref_name }}
            ${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}:latest

      - name: Sign container image (keyless cosign)
        # Sign the specific digest to ensure the signature is immutably tied to this exact image.
        run: |
          cosign sign --yes \
            "${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}@${{ steps.push.outputs.digest }}"

      - name: Generate and attach SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}@${{ steps.push.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.component.name }}.spdx.json
          output-file: sbom-${{ matrix.component.name }}.spdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.component.name }}.spdx.json \
            --type spdxjson \
            "${{ env.CONTAINER_REGISTRY }}/${{ matrix.component.name }}@${{ steps.push.outputs.digest }}"
