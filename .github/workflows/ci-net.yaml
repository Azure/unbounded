name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  CNI_PLUGINS_VERSION: v1.9.0

jobs:
  # ---------- Stage 0: Compute version ----------
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      build_time: ${{ steps.version.outputs.build_time }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          TAG=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION="${TAG#v}"
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

  # ---------- Stage 0b: Build frontend (shared by lint, test, build) ----------
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci --prefer-offline --no-audit && npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ---------- Stage 0c: Lint, test, and validation ----------
  validate:
    name: Validate
    needs: [version, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

      - name: Go build/mod cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/ms-go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-

      - name: Check formatting
        run: |
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "Files not formatted:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          fi

      - name: Check codegen is up to date
        run: |
          make generate
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'make generate' and commit."
            git diff --stat
            exit 1
          fi

      - name: Render Kubernetes manifests
        run: |
          go run ./tools/render-manifests \
            --templates-dir deploy \
            --output-dir build/manifests \
            --namespace unbounded-net \
            --controller-image "${{ env.REGISTRY }}/unbounded-net-controller:${{ needs.version.outputs.tag }}" \
            --node-image "${{ env.REGISTRY }}/unbounded-net-node:${{ needs.version.outputs.tag }}"
          mkdir -p build/manifests/crds
          cp deploy/crds/*.yaml build/manifests/crds/
          tar czf "build/unbounded-net-manifests-${{ needs.version.outputs.tag }}.tar.gz" -C build/manifests .

      - name: Upload manifest assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-manifests
          path: build/unbounded-net-manifests-*.tar.gz
          retention-days: 7

  lint:
    name: Lint
    needs: [version, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download frontend dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: pkg/html/dist

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

      - name: Go build/mod cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/ms-go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4

  test:
    name: Test
    needs: [version, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download frontend dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: pkg/html/dist

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

      - name: Go build/mod cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/ms-go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-test-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-test-

      - name: Run tests
        run: go test -race ./...
        env:
          GODEBUG: gocachetest=1

  govulncheck:
    name: Security Scan
    needs: [version, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

      - name: Go build/mod cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/ms-go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-ci-

      - name: Run govulncheck
        run: go tool govulncheck ./...

  # ---------- Stage 1: Build per-arch images (parallel with checks) ----------
  build:
    name: Build (${{ matrix.arch }})
    needs: [version, frontend]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Normalize container registry
        run: echo "REGISTRY=${REGISTRY,,}" >> "$GITHUB_ENV"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download frontend dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: pkg/html/dist

      - name: Cache CNI plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: resources
          key: cni-plugins-${{ matrix.arch }}-${{ env.CNI_PLUGINS_VERSION }}

      - name: Download CNI plugins
        run: |
          mkdir -p resources
          file="resources/cni-plugins-linux-${{ matrix.arch }}-${CNI_PLUGINS_VERSION}.tgz"
          if [ ! -s "$file" ]; then
            curl -fsSL "https://github.com/containernetworking/plugins/releases/download/${CNI_PLUGINS_VERSION}/cni-plugins-linux-${{ matrix.arch }}-${CNI_PLUGINS_VERSION}.tgz" -o "$file"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Compute Go version for Docker
        id: goversion
        run: echo "go_version=$(awk '/^go /{split($2,v,"."); print v[1]"."v[2]}' go.mod)" >> "$GITHUB_OUTPUT"

      - name: Build controller image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: docker/Dockerfile
          target: controller
          platforms: ${{ matrix.platform }}
          build-args: |
            GO_VERSION=${{ steps.goversion.outputs.go_version }}
            VERSION=${{ needs.version.outputs.tag }}
            CNI_PLUGINS_VERSION=${{ env.CNI_PLUGINS_VERSION }}
          tags: ${{ env.REGISTRY }}/unbounded-net-controller:${{ needs.version.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          push: false
          provenance: false

      - name: Build node image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: docker/Dockerfile
          target: node
          platforms: ${{ matrix.platform }}
          build-args: |
            GO_VERSION=${{ steps.goversion.outputs.go_version }}
            VERSION=${{ needs.version.outputs.tag }}
            CNI_PLUGINS_VERSION=${{ env.CNI_PLUGINS_VERSION }}
          tags: ${{ env.REGISTRY }}/unbounded-net-node:${{ needs.version.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          push: false
          provenance: false

  plugin:
    name: Plugin (${{ matrix.os }}/${{ matrix.arch }})
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

      - name: Go build/mod cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/ms-go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-plugin-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-plugin-${{ matrix.os }}-${{ matrix.arch }}-


      - name: Build kubectl plugin
        env:
          CGO_ENABLED: "0"
          GOEXPERIMENT: nosystemcrypto
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          LDFLAGS="-s -w -X main.Version=${{ needs.version.outputs.tag }}"
          go build -ldflags "$LDFLAGS" \
            -o "kubectl-unbounded-net-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" \
            ./tools/kubectl-plugin/cmd/kubectl-unbounded-net

      - name: Upload plugin binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: plugin-${{ matrix.os }}-${{ matrix.arch }}
          path: kubectl-unbounded-net-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          retention-days: 7

