name: unbounded container images

on:
  push:
    tags:
      - "images/*/*"

  workflow_dispatch:
    inputs:
      image:
        description: "Image to build (directory name under images/, e.g. \"agent-ubuntu2404\")"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  CONTAINER_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the image name and tag from the trigger context.
  #
  #   Tag push  (images/<name>/<version>)  →  <name>:<version>
  #   workflow_dispatch                     →  <name>:<sha>
  # ---------------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
      tag: ${{ steps.resolve.outputs.tag }}
      file: ${{ steps.resolve.outputs.file }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve image name and tag
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag is like "images/agent-ubuntu2404/v1.0.0"
            ref="${{ github.ref_name }}"            # e.g. images/agent-ubuntu2404/v1.0.0
            name=$(echo "$ref" | cut -d/ -f2)       # e.g. agent-ubuntu2404
            tag=$(echo "$ref" | cut -d/ -f3-)       # e.g. v1.0.0
          else
            # workflow_dispatch
            name="${{ inputs.image }}"
            tag="${{ github.sha }}"
          fi

          file="images/${name}/Containerfile"

          if [[ ! -f "$file" ]]; then
            echo "::error::No Containerfile found at ${file}"
            exit 1
          fi

          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "file=${file}" >> "$GITHUB_OUTPUT"

          echo "Image: ${name}:${tag}"
          echo "Containerfile: ${file}"

  # ---------------------------------------------------------------------------
  # Build and push multi-arch container image.
  # ---------------------------------------------------------------------------
  build:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Normalize container registry
        run: echo "CONTAINER_REGISTRY=${CONTAINER_REGISTRY,,}" >> "$GITHUB_ENV"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ needs.resolve.outputs.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.CONTAINER_REGISTRY }}/${{ needs.resolve.outputs.name }}:${{ needs.resolve.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
