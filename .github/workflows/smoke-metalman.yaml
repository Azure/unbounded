name: Smoke Metalman

on:
  pull_request:
    paths:
      - cmd/metalman/**
      - internal/metalman/**
      - deploy/machina/**
      - hack/smoke-metalman.py
      - hack/kind-smoke-config.yaml
      - images/host-ubuntu2404/**
      - images/agent-ubuntu2404/**
      - go.mod
      - go.sum
      - .github/workflows/smoke-metalman.yaml
  push:
    branches: [main]
    paths:
      - cmd/metalman/**
      - internal/metalman/**
      - api/v1alpha3/**
      - deploy/machina/**
      - hack/smoke-metalman.py
      - hack/kind-smoke-config.yaml
      - images/host-ubuntu2404/**
      - images/agent-ubuntu2404/**
      - go.mod
      - go.sum
      - .github/workflows/smoke-metalman.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Free disk space
        run: |
          # GitHub-hosted runners have ~14 GB free; the smoke test needs
          # much more because it builds two Docker images (one containing a
          # full Ubuntu cloud image) and creates a 20 GB qcow2 VM disk that
          # grows dynamically.  Remove the largest pre-installed toolchains
          # in parallel and prune unused Docker images.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
                      /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL &
          sudo docker image prune -af &
          wait
          df -h /

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dnsmasq qemu-kvm libvirt-daemon-system libvirt-clients virtinst \
            ovmf qemu-utils swtpm swtpm-tools \
            python3-pip python3-yaml cpio iptables

      - name: Start libvirt
        run: sudo systemctl start libvirtd

      - name: Install sushy-tools
        run: sudo pip3 install --break-system-packages --ignore-installed sushy-tools

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          driver-opts: network=host

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind
          # The smoke test assigns 192.168.200.2 (KIND_SMOKE_IP) to the kind
          # container on virbr-smoke and rewrites the apiserver URL to that IP.
          # Include it as an extra SAN so the kubelet in the VM can verify the
          # API server TLS certificate.
          config: hack/kind-smoke-config.yaml

      - name: Run smoke test
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          sudo mkdir -p /root/.kube
          sudo cp "${KUBECONFIG:-$HOME/.kube/config}" /root/.kube/config
          # Share the buildx builder and GHA cache credentials with the
          # smoke test so it can use cached Docker layers.
          sudo -E env "PATH=$PATH" \
            "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" \
            "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" \
            "BUILDX_CONFIG=${HOME}/.docker/buildx" \
            "BUILDX_BUILDER=${BUILDX_BUILDER}" \
            python3 hack/smoke-metalman.py
