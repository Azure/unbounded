name: Smoke Metalman

on:
  pull_request:
    paths:
      - cmd/metalman/**
      - internal/metalman/**
      - deploy/metalman/**
      - hack/smoke-metalman.py
      - images/host-ubuntu2404/**
      - go.mod
      - go.sum
      - .github/workflows/smoke-metalman.yaml
  push:
    branches: [main]
    paths:
      - cmd/metalman/**
      - internal/metalman/**
      - api/v1alpha3/**
      - deploy/metalman/**
      - deploy/machina/crd/**
      - deploy/machina/01-namespace.yaml
      - hack/smoke-metalman.py
      - images/host-ubuntu2404/**
      - go.mod
      - go.sum
      - .github/workflows/smoke-metalman.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dnsmasq qemu-kvm libvirt-daemon-system libvirt-clients virtinst \
            ovmf qemu-utils swtpm swtpm-tools \
            python3-pip python3-yaml cpio iptables

      - name: Start libvirt
        run: sudo systemctl start libvirtd

      - name: Install sushy-tools
        run: sudo pip3 install --break-system-packages --ignore-installed sushy-tools

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind

      - name: Run smoke test
        run: |
          sudo mkdir -p /root/.kube
          sudo cp "${KUBECONFIG:-$HOME/.kube/config}" /root/.kube/config
          sudo -E env "PATH=$PATH" python3 hack/smoke-metalman.py
