name: unbounded metalman smoke test

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - cmd/metalman/**
      - internal/metalman/**
      - api/v1alpha3/**
      - deploy/machina/**
      - deploy/net/**
      - hack/smoke-metalman.py
      - hack/kind-smoke-config.yaml
      - images/host-ubuntu2404/**
      - images/agent-ubuntu2404/**
      - go.mod
      - go.sum
      - .github/workflows/smoke-metalman.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Free disk space
        run: |
          # GitHub-hosted runners have ~14 GB free; the smoke test needs
          # much more because it builds two Docker images (one containing a
          # full Ubuntu cloud image) and creates a 20 GB qcow2 VM disk that
          # grows dynamically.  Remove the largest pre-installed toolchains
          # in parallel and prune unused Docker images.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
                      /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL &
          sudo docker image prune -af &
          wait
          df -h /

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-smoke-noble-${{ hashFiles('.github/workflows/smoke-metalman.yaml') }}
          restore-keys: apt-smoke-noble-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Install sushy-tools via pip in the background while apt-get
          # installs system packages.  pip3 is already available on the
          # runner image so this does not depend on apt-get.
          sudo pip3 install --break-system-packages --ignore-installed sushy-tools &
          PIP_PID=$!
          sudo apt-get install -y --no-install-recommends \
            dnsmasq qemu-kvm libvirt-daemon-system libvirt-clients virtinst \
            ovmf qemu-utils swtpm swtpm-tools \
            python3-pip python3-yaml cpio iptables
          sudo systemctl start libvirtd
          wait "$PIP_PID"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      - name: Build host-ubuntu2404 image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: images/host-ubuntu2404/Containerfile
          load: true
          tags: localhost:5555/unbounded/host-ubuntu2404:smoke
          cache-from: type=gha,scope=host-ubuntu2404
          cache-to: type=gha,mode=max,scope=host-ubuntu2404
          provenance: false

      - name: Build agent-ubuntu2404 image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: images/agent-ubuntu2404
          file: images/agent-ubuntu2404/Containerfile
          load: true
          tags: localhost:5555/unbounded/agent-ubuntu2404:smoke
          cache-from: type=gha,scope=agent-ubuntu2404
          cache-to: type=gha,mode=max,scope=agent-ubuntu2404
          provenance: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind
          # The smoke test assigns 192.168.200.2 (KIND_SMOKE_IP) to the kind
          # container on virbr-smoke and rewrites the apiserver URL to that IP.
          # Include it as an extra SAN so the kubelet in the VM can verify the
          # API server TLS certificate.
          config: hack/kind-smoke-config.yaml

      - name: Run smoke test
        run: |
          sudo mkdir -p /root/.kube
          sudo cp "${KUBECONFIG:-$HOME/.kube/config}" /root/.kube/config
          sudo -E env "PATH=$PATH" \
            python3 hack/smoke-metalman.py
