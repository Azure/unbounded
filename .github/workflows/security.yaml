name: Security - CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  # Run weekly to catch newly disclosed vulnerability patterns even without code changes.
  schedule:
    - cron: "25 3 * * 1"

permissions:
  contents: read
  # Required to upload results to the GitHub Security tab.
  security-events: write
  # Required by CodeQL analyze action to read workflow run metadata.
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          # Use the security-and-quality query suite for comprehensive coverage.
          queries: security-and-quality

      - name: Build
        # Build explicitly rather than using autobuild so we don't trigger
        # Makefile targets that require dev tools (gofumpt, golangci-lint).
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
