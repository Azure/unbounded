name: Container Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - "cmd/machina/oci/**"
      - "cmd/metalman/oci/**"
      - "images/agent-ubuntu2404/**"

permissions:
  contents: read
  # Required to upload SARIF results to the GitHub Security tab.
  security-events: write

jobs:
  scan:
    name: Scan ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: machina
            context: "."
            file: "cmd/machina/oci/Containerfile"
          - name: metalman
            context: "."
            file: "cmd/metalman/oci/Containerfile"
          - name: agent-ubuntu2404
            context: "images/agent-ubuntu2404"
            file: "images/agent-ubuntu2404/Containerfile"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: false
          load: true
          tags: scan/${{ matrix.image.name }}:pr

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan/${{ matrix.image.name }}:pr
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          # Report all severities but only fail on CRITICAL and HIGH.
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF results
        # Always upload so the Security tab shows results even when the scan step fails.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
