apiVersion: apps/v1
kind: Deployment
metadata:
  name: metalman-controller
  namespace: machina-system
  labels:
    app: metalman-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metalman-controller
  template:
    metadata:
      labels:
        app: metalman-controller
    spec:
      serviceAccountName: metalman-controller
      tolerations:
        - key: CriticalAddonsOnly
          operator: Equal
          value: "true"
          effect: NoSchedule
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      containers:
        - name: metalman
          image: metalman:latest
          imagePullPolicy: Always
          args:
            - serve-pxe
          ports:
            - containerPort: 8880
              name: http
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 67
              name: dhcp
              protocol: UDP
            - containerPort: 69
              name: tftp
              protocol: UDP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/metalman
