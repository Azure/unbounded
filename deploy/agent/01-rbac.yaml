# RBAC for the unbounded-agent daemon running on worker nodes.
#
# The daemon watches the Machine CR that corresponds to its node and updates
# the Machine status after reconciliation. It authenticates using the
# bootstrap token from the applied agent config, which belongs to the
# system:bootstrappers group.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: unbounded-agent-daemon
rules:
  - apiGroups: ["unbounded-kube.io"]
    resources: ["machines"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["unbounded-kube.io"]
    resources: ["machines/status"]
    verbs: ["get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: unbounded-agent-daemon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: unbounded-agent-daemon
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:bootstrappers
