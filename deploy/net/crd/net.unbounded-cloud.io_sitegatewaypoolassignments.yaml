            type: object
          spec:
            description: SiteGatewayPoolAssignmentSpec defines desired state for site
              to gateway-pool assignments.
            properties:
              enabled:
                description: |-
                  Enabled controls whether this assignment is active.
                  Defaults to true.
                type: boolean
              gatewayPools:
                description: GatewayPools is the list of gateway pool names.
