---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: machines.machina.unboundedkube.io
spec:
  group: machina.unboundedkube.io
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
    shortNames:
      - mach
  scope: Cluster
  versions:
    - name: v1alpha2
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Host
          type: string
          jsonPath: .spec.ssh.host
        - name: Port
          type: integer
          jsonPath: .spec.ssh.port
        - name: Model
          type: string
          jsonPath: .spec.modelRef.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Node
          type: string
          jsonPath: .status.nodeRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - ssh
              properties:
                ssh:
                  type: object
                  description: SSH connection details for the machine
                  required:
                    - host
                  properties:
                    host:
                      type: string
                      description: Hostname or IP address of the machine
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 22
                      description: SSH port of the machine
                modelRef:
                  type: object
                  description: >-
                    Optional reference to a MachineModel. When set the controller
                    will provision the machine using the referenced model once the
                    machine is reachable.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the MachineModel
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Current phase of the machine
                  enum:
                    - Pending
                    - Ready
                    - Provisioning
                    - Provisioned
                    - Joined
                    - Orphaned
                    - Failed
                message:
                  type: string
                  description: Additional status information
                lastProbeTime:
                  type: string
                  format: date-time
                  description: Last time the machine was probed
                provisionedModelGeneration:
                  type: integer
                  format: int64
                  description: >-
                    Generation of the MachineModel that was used to provision
                    this machine. Only set when phase is Provisioned.
                nodeRef:
                  type: object
                  description: >-
                    Reference to the Node that corresponds to this Machine.
                    Set when the machine transitions to Joined.
                  properties:
                    name:
                      type: string
                      description: Name of the Node
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
