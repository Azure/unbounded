---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: machineoperations.unbounded-kube.io
spec:
  group: unbounded-kube.io
  names:
    kind: MachineOperation
    listKind: MachineOperationList
    plural: machineoperations
    shortNames:
    - mop
    singular: machineoperation
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.machineRef
      name: Machine
      type: string
    - jsonPath: .spec.operationName
      name: Operation
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: |-
          MachineOperation represents a discrete operation to be performed on a
          Machine. MachineOperations are created by CLI commands or controllers and
          processed by the appropriate agent - the in-VM agent handles operations
          like Reboot, while cloud or PXE controllers handle operations like
          PowerCycle, PowerOff, and PowerOn.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MachineOperationSpec defines the desired state of a MachineOperation.
            properties:
              machineRef:
                description: MachineRef is the name of the Machine CR this operation
                  targets.
                minLength: 1
                type: string
              operationName:
                description: OperationName is the operation to perform on the target
                  machine.
                enum:
                - Reboot
                - PowerCycle
                - Shutdown
                - PowerOff
                - PowerOn
                - RestartService
                type: string
              parameters:
                additionalProperties:
                  type: string
                description: |-
                  Parameters is an optional set of key-value pairs passed to the
                  operation executor. For example, RestartService uses "service" to
                  specify the systemd unit name.
                type: object
              ttlSecondsAfterFinished:
                description: |-
                  TTLSecondsAfterFinished limits the lifetime of a completed or failed
                  MachineOperation. If set, the agent deletes the MachineOperation
                  this many seconds after it reaches a terminal phase. If unset, the
                  MachineOperation is kept indefinitely.
                format: int32
                minimum: 0
                type: integer
            required:
            - machineRef
            - operationName
            type: object
          status:
            description: MachineOperationStatus defines the observed state of a MachineOperation.
            properties:
              completedAt:
                description: |-
                  CompletedAt is when the operation reached a terminal state
                  (Complete or Failed).
                format: date-time
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  operation's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message is a human-readable description of the current
                  state.
                type: string
              phase:
                description: Phase is the current phase of the operation.
                type: string
              startedAt:
                description: StartedAt is when the agent began executing the operation.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
