apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: machineconfigurations.unbounded-kube.io
spec:
  group: unbounded-kube.io
  names:
    kind: MachineConfiguration
    listKind: MachineConfigurationList
    plural: machineconfigurations
    shortNames:
    - mc
    singular: machineconfiguration
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.latestVersion
      name: Latest Version
      type: integer
    - jsonPath: .spec.updateStrategy.type
      name: Update Strategy
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: |-
          MachineConfiguration stores a configuration profile for a class of
          machines. It acts like a Deployment: edits to the spec automatically
          create or update a child MachineConfigurationVersion, similar to how
          Deployment edits create or update ReplicaSets.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MachineConfigurationSpec defines the desired configuration profile for
              a class of machines.
            properties:
              machineSelector:
                description: |-
                  MachineSelector selects machines that should automatically
                  receive this configuration. If set, new machines matching the
                  selector will be assigned the latest locked version of the
                  highest priority configuration that matches.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              priority:
                default: 0
                description: |-
                  Priority determines which configuration is selected when multiple
                  configurations match a machine's labels. Higher values take
                  precedence. When two configurations have the same priority,
                  lexicographic ordering of names is used as a tiebreaker.
                format: int32
                type: integer
              revisionHistoryLimit:
                default: 10
                description: |-
                  RevisionHistoryLimit is the number of old
                  MachineConfigurationVersions to retain for rollback. Versions
                  that are still referenced by a Machine are never deleted
                  regardless of this limit.
                format: int32
                minimum: 0
                type: integer
              template:
                description: |-
                  Template contains the configuration fields that are versioned
                  into MachineConfigurationVersion objects.
                properties:
                  agent:
                    description: |-
                      Agent contains settings for the unbounded node agent (e.g. the
                      OCI image reference for the nspawn machine).
                    properties:
                      image:
                        description: |-
                          Image is the OCI image reference used for provisioning the
                          nspawn machine (e.g. "ghcr.io/org/repo:tag").
                        type: string
                    required:
                    - image
                    type: object
                  kubernetes:
                    description: |-
                      Kubernetes contains Kubernetes-specific configuration such as
                      the target version, node labels, and taints.
                    properties:
                      nodeLabels:
                        additionalProperties:
                          type: string
                        description: NodeLabels are labels passed to kubelet's --node-labels
                          flag.
                        type: object
                      registerWithTaints:
                        description: |-
                          RegisterWithTaints are taints passed to kubelet's
                          --register-with-taints flag. Each entry uses the standard
                          Kubernetes taint format: key=value:Effect.
                        items:
                          type: string
                        type: array
                      version:
                        description: Version is the Kubernetes version to install
                          (e.g. "v1.34.0").
                        type: string
                    type: object
                type: object
              updateStrategy:
                description: |-
                  UpdateStrategy controls how configuration changes are rolled out
                  to machines that reference this configuration.
                properties:
                  maxUnavailable:
                    description: |-
                      MaxUnavailable is the maximum number of machines that can be
                      unavailable during a RollingUpdate. Only used when Type is
                      RollingUpdate. Can be an absolute number or a percentage.
                    format: int32
                    type: integer
                  type:
                    default: OnDelete
                    description: Type is the update strategy type.
                    enum:
                    - OnDelete
                    - RollingUpdate
                    type: string
                type: object
            required:
            - template
            type: object
          status:
            description: |-
              MachineConfigurationStatus defines the observed state of a
              MachineConfiguration.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  MachineConfiguration's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentVersion:
                description: |-
                  CurrentVersion is the version number of the latest non-deployed
                  (editable) MachineConfigurationVersion. If all versions are
                  deployed, this is 0.
                format: int32
                type: integer
              latestVersion:
                description: |-
                  LatestVersion is the highest version number that has been
                  created for this MachineConfiguration. The controller uses this
                  to avoid reusing version numbers when versions are deleted.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
