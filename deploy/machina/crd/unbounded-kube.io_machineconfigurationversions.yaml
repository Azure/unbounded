---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: machineconfigurationversions.unbounded-kube.io
spec:
  group: unbounded-kube.io
  names:
    kind: MachineConfigurationVersion
    listKind: MachineConfigurationVersionList
    plural: machineconfigurationversions
    shortNames:
    - mcv
    singular: machineconfigurationversion
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.unbounded-kube\.io/machine-configuration
      name: Configuration
      type: string
    - jsonPath: .spec.version
      name: Version
      type: integer
    - jsonPath: .status.deployed
      name: Deployed
      type: boolean
    - jsonPath: .status.deployedMachines
      name: Machines
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: |-
          MachineConfigurationVersion is an immutable-once-deployed snapshot of a
          MachineConfiguration's spec at a specific point in time. It acts like a
          ReplicaSet to a Deployment: the MachineConfiguration controller
          automatically creates and manages these objects. Versions remain
          editable until they are deployed (referenced by a Machine). Once
          deployed, the spec fields become immutable.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MachineConfigurationVersionSpec defines the versioned configuration
              snapshot.
            properties:
              template:
                description: |-
                  Template is the configuration snapshot copied from the parent
                  MachineConfiguration at the time this version was created or
                  last updated (while still editable).
                properties:
                  agent:
                    description: |-
                      Agent contains settings for the unbounded node agent (e.g. the
                      OCI image reference for the nspawn machine).
                    properties:
                      image:
                        description: |-
                          Image is the OCI image reference used for provisioning the
                          nspawn machine (e.g. "ghcr.io/org/repo:tag").
                        type: string
                    required:
                    - image
                    type: object
                  kubernetes:
                    description: |-
                      Kubernetes contains Kubernetes-specific configuration such as
                      the target version, node labels, and taints.
                    properties:
                      nodeLabels:
                        additionalProperties:
                          type: string
                        description: NodeLabels are labels passed to kubelet's --node-labels
                          flag.
                        type: object
                      registerWithTaints:
                        description: |-
                          RegisterWithTaints are taints passed to kubelet's
                          --register-with-taints flag. Each entry uses the standard
                          Kubernetes taint format: key=value:Effect.
                        items:
                          type: string
                        type: array
                      version:
                        description: Version is the Kubernetes version to install
                          (e.g. "v1.34.0").
                        type: string
                    type: object
                type: object
              version:
                description: |-
                  Version is the monotonically increasing version number within
                  the parent MachineConfiguration.
                format: int32
                minimum: 1
                type: integer
            required:
            - template
            - version
            type: object
          status:
            description: |-
              MachineConfigurationVersionStatus defines the observed state of a
              MachineConfigurationVersion.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deployed:
                description: |-
                  Deployed indicates whether any Machine has been provisioned
                  using this version. Once true, the spec fields are immutable.
                type: boolean
              deployedMachines:
                description: |-
                  DeployedMachines is the count of Machines currently referencing
                  this version.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
