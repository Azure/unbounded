---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: machines.unbounded-kube.io
spec:
  group: unbounded-kube.io
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    shortNames:
    - mach
    singular: machine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ssh.host
      name: Host
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.kubernetes.version
      name: K8s Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: Machine represents a machine that can be managed by machina.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MachineSpec defines the desired state of a Machine.
            properties:
              agent:
                description: Agent contains settings for the unbounded node agent.
                properties:
                  image:
                    description: |-
                      Image is the OCI image reference used for provisioning the
                      nspawn machine (e.g. "ghcr.io/org/repo:tag").
                    type: string
                required:
                - image
                type: object
              kubernetes:
                description: Kubernetes contains Kubernetes-specific configuration.
                properties:
                  bootstrapTokenRef:
                    description: |-
                      BootstrapTokenRef references a bootstrap token Secret in
                      kube-system. The secret must be of type
                      bootstrap.kubernetes.io/token with the well-known keys
                      "token-id" and "token-secret".
                    properties:
                      name:
                        description: Name of the referenced resource.
                        type: string
                    required:
                    - name
                    type: object
                  nodeLabels:
                    additionalProperties:
                      type: string
                    description: NodeLabels are labels passed to kubelet's --node-labels
                      flag.
                    type: object
                  nodeRef:
                    description: NodeRef references the Node that corresponds to this
                      Machine.
                    properties:
                      name:
                        description: Name of the referenced resource.
                        type: string
                    required:
                    - name
                    type: object
                  registerWithTaints:
                    description: |-
                      RegisterWithTaints are taints passed to kubelet's --register-with-taints flag.
                      Each entry uses the standard Kubernetes taint format: key=value:Effect.
                    items:
                      type: string
                    type: array
                  version:
                    description: |-
                      Version is the Kubernetes version to install (e.g., "v1.34.0").
                      When omitted the controller falls back to the cluster's
                      Kubernetes version.
                    type: string
                required:
                - bootstrapTokenRef
                type: object
              operations:
                description: Operations contains counter-based operation triggers.
                properties:
                  rebootCounter:
                    description: |-
                      RebootCounter triggers a reboot when it exceeds the status
                      reboot counter.
                    format: int64
                    type: integer
                  reimageCounter:
                    description: |-
                      ReimageCounter triggers a reimage when it exceeds the status
                      reimage counter.
                    format: int64
                    type: integer
                type: object
              pxe:
                description: PXE contains PXE boot configuration for the machine.
                properties:
                  dhcpLeases:
                    description: DHCPLeases defines static DHCP leases for PXE booting.
                    items:
                      description: DHCPLease defines a static DHCP lease for PXE booting.
                      properties:
                        dns:
                          description: DNS is a list of DNS server addresses.
                          items:
                            type: string
                          type: array
                        gateway:
                          description: Gateway is the default gateway.
                          type: string
                        ipv4:
                          description: IPv4 is the IP address to assign.
                          type: string
                        mac:
                          description: MAC is the MAC address of the network interface.
                          type: string
                        subnetMask:
                          description: SubnetMask is the subnet mask for the lease.
                          type: string
                      required:
                      - gateway
                      - ipv4
                      - mac
                      - subnetMask
                      type: object
                    type: array
                  image:
                    description: |-
                      Image is an OCI image reference containing netboot artifacts.
                      Example: "ghcr.io/project-unbounded/images/host-ubuntu2404:v1"
                    type: string
                  redfish:
                    description: Redfish configures optional Redfish BMC access.
                    properties:
                      deviceID:
                        default: "1"
                        description: DeviceID is the Redfish system device ID. Defaults
                          to "1".
                        type: string
                      passwordRef:
                        description: PasswordRef references a secret containing the
                          Redfish password.
                        properties:
                          key:
                            default: ssh-privatekey
                            description: Key within the secret.
                            type: string
                          name:
                            description: Name of the secret.
                            type: string
                          namespace:
                            description: Namespace of the secret.
                            type: string
                        required:
                        - name
                        - namespace
                        type: object
                      url:
                        description: URL is the Redfish endpoint URL.
                        type: string
                      username:
                        description: Username is the Redfish username.
                        type: string
                    required:
                    - passwordRef
                    - url
                    - username
                    type: object
                required:
                - image
                type: object
              ssh:
                description: |-
                  SSH contains the SSH connection and credential details for the
                  machine.
                properties:
                  bastion:
                    description: |-
                      Bastion configures an optional SSH jump host (bastion) for proxy
                      connections. Its structure is identical to SSHSpec minus the
                      bastion field itself.
                    properties:
                      host:
                        description: |-
                          Host is the hostname or IP address of the bastion, optionally
                          including the port (e.g. "1.2.3.4:2222"). When the port is
                          omitted, 22 is assumed.
                        type: string
                      privateKeyRef:
                        description: |-
                          PrivateKeyRef references a secret containing the SSH private key
                          for the bastion. If not specified, uses the same key as the
                          parent SSHSpec.
                        properties:
                          key:
                            default: ssh-privatekey
                            description: Key within the secret.
                            type: string
                          name:
                            description: Name of the secret.
                            type: string
                          namespace:
                            description: Namespace of the secret.
                            type: string
                        required:
                        - name
                        - namespace
                        type: object
                      username:
                        default: azureuser
                        description: Username is the SSH username for the bastion.
                        type: string
                    required:
                    - host
                    type: object
                  host:
                    description: |-
                      Host is the hostname or IP address of the machine, optionally
                      including the port (e.g. "1.2.3.4:2222"). When the port is
                      omitted, 22 is assumed.
                    type: string
                  privateKeyRef:
                    description: PrivateKeyRef references a secret containing the
                      SSH private key.
                    properties:
                      key:
                        default: ssh-privatekey
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  username:
                    default: azureuser
                    description: Username is the SSH username.
                    type: string
                required:
                - host
                - privateKeyRef
                type: object
            type: object
          status:
            description: MachineStatus defines the observed state of a Machine.
            properties:
              agent:
                description: Agent holds the applied agent settings.
                properties:
                  image:
                    description: |-
                      Image is the OCI image reference that was applied to the
                      nspawn machine.
                    type: string
                type: object
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  machine's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Message provides additional status information.
                type: string
              operations:
                description: Operations holds the last-observed operation counters.
                properties:
                  rebootCounter:
                    description: RebootCounter is the last reboot counter value that
                      was acted on.
                    format: int64
                    type: integer
                  reimageCounter:
                    description: ReimageCounter is the last reimage counter value
                      that was acted on.
                    format: int64
                    type: integer
                type: object
              phase:
                description: |-
                  Phase is the current phase of the machine. Intended for human
                  consumption; follows the state machine rather than driving it.
                type: string
              redfish:
                description: Redfish holds observed Redfish state.
                properties:
                  certFingerprint:
                    description: |-
                      CertFingerprint is the TLS certificate fingerprint for the
                      Redfish endpoint, pinned on first connection.
                    type: string
                type: object
              ssh:
                description: SSH holds observed SSH state.
                properties:
                  fingerprint:
                    description: |-
                      Fingerprint is the SSH host key fingerprint discovered on
                      first connection. Subsequent connections must match this value.
                    type: string
                type: object
              tpm:
                description: TPM holds observed TPM state.
                properties:
                  ekPublicKey:
                    description: |-
                      EKPublicKey is the TPM endorsement key public key, written
                      when the PXE boot image requests a bootstrap token.
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
