---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: machinemodels.machina.unboundedkube.io
spec:
  group: machina.unboundedkube.io
  names:
    kind: MachineModel
    listKind: MachineModelList
    plural: machinemodels
    singular: machinemodel
    shortNames:
      - mm
  scope: Cluster
  versions:
    - name: v1alpha2
      served: true
      storage: true
      additionalPrinterColumns:
        - name: K8s Version
          type: string
          jsonPath: .spec.kubernetesProfile.version
        - name: SSH User
          type: string
          jsonPath: .spec.sshUsername
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - sshPrivateKeyRef
                - agentInstallScript
              properties:
                sshUsername:
                  type: string
                  default: azureuser
                  description: SSH username for machines using this model
                sshPrivateKeyRef:
                  type: object
                  description: Reference to a secret containing the SSH private key
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the secret
                    key:
                      type: string
                      default: ssh-privatekey
                      description: Key within the secret
                jumpbox:
                  type: object
                  description: >-
                    Optional SSH jump host (bastion) configuration. The controller
                    will open a connection to the jumpbox and then jump to the
                    target machine.
                  required:
                    - host
                  properties:
                    host:
                      type: string
                      description: Hostname or IP address of the jumpbox
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 22
                      description: SSH port of the jumpbox
                    sshUsername:
                      type: string
                      default: azureuser
                      description: SSH username for the jumpbox
                    sshPrivateKeyRef:
                      type: object
                      description: >-
                        Reference to SSH private key for the jumpbox.
                        If not specified, uses the model's sshPrivateKeyRef.
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          description: Name of the secret
                        key:
                          type: string
                          default: ssh-privatekey
                          description: Key within the secret
                agentInstallScript:
                  type: string
                  description: >-
                    Script that will be copied to the target machine and
                    executed with sudo -E bash to install and configure the agent.
                kubernetesProfile:
                  type: object
                  description: Kubernetes-specific configuration
                  required:
                    - bootstrapTokenRef
                  properties:
                    version:
                      type: string
                      description: >-
                        Kubernetes version to install (e.g., "1.34.0"). When
                        omitted the controller falls back to the cluster version.
                    bootstrapTokenRef:
                      type: object
                      description: >-
                        Reference to a bootstrap token Secret in kube-system.
                        The secret must be of type bootstrap.kubernetes.io/token
                        with the well-known keys "token-id" and "token-secret".
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          description: Name of the bootstrap token secret
