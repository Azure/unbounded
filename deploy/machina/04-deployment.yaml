apiVersion: apps/v1
kind: Deployment
metadata:
  name: machina-controller
  namespace: machina-system
  labels:
    app: machina-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: machina-controller
  template:
    metadata:
      labels:
        app: machina-controller
      annotations:
        kubernetes.azure.com/set-kube-service-host-fqdn: "true"
    spec:
      serviceAccountName: machina-controller
      tolerations:
        - key: CriticalAddonsOnly
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: unbounded.aks.azure.com/gateway-node
          operator: Equal
          value: "true"
          effect: NoSchedule
      volumes:
        - name: tmp
          emptyDir: { }
        - name: machina-config
          configMap:
            name: machina-config
      containers:
        - name: machina-controller
          image: stargatetmedev.azurecr.io/machina:latest
          imagePullPolicy: Always
          args:
            - controller
            - --config=/etc/machina/config.yaml
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: machina-config
              mountPath: /etc/machina/config.yaml
              subPath: config.yaml
              readOnly: true